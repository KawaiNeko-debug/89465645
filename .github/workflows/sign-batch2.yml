name: 账户组2

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # 北京时间 08:00 (UTC 00:00)

env:
  TZ: Asia/Shanghai

permissions:
  contents: read
  actions: write

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}
    steps:
      - id: matrix
        shell: bash
        env:
          ACCOUNTS: ${{ secrets.ACCOUNTS_BATCH2 }}
        run: |
          python - <<'PY'
          import os, json
          lines = [l.strip() for l in os.environ['ACCOUNTS'].splitlines() if l.strip()]
          count = len(lines)
          if count == 0:
              raise SystemExit('ACCOUNTS_BATCH2 为空')
          matrix = {"account_index": list(range(1, count + 1))}
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
              f.write(f"count={count}\n")
          PY

  run:
    needs: prepare
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      PASSPORT_URL: ${{ secrets.PASSPORT_URL }}
      REFERER: ${{ secrets.REFERER }}
      SLIDER_ID: ${{ secrets.SLIDER_ID }}
      WRAPPER_ID: ${{ secrets.WRAPPER_ID }}
      HEADER_CLIENT_TYPE: ${{ secrets.HEADER_CLIENT_TYPE }}
      HEADER_ACCESS_TOKEN: ${{ secrets.HEADER_ACCESS_TOKEN }}
      HEADER_ACCESS_TOKEN_FALLBACKS: ${{ secrets.HEADER_ACCESS_TOKEN_FALLBACKS }}
      HEADER_SECRET_KEY: ${{ secrets.HEADER_SECRET_KEY }}
      TOKEN_KEY: ${{ secrets.TOKEN_KEY }}
      TOKEN_ALTERNATIVE_KEYS: ${{ secrets.TOKEN_ALTERNATIVE_KEYS }}
      API_SIGN_PATH: ${{ secrets.API_SIGN_PATH }}
      ACCOUNT_INDEX: ${{ matrix.account_index }}
      ACCOUNTS: ${{ secrets.ACCOUNTS_BATCH2 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r h3/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Select account
        shell: bash
        run: |
          python - <<'PY'
          import os
          lines = [l.strip() for l in os.environ['ACCOUNTS'].splitlines() if l.strip()]
          idx = int(os.environ['ACCOUNT_INDEX'])
          if idx < 1 or idx > len(lines):
              raise SystemExit(f"Index {idx} out of range 1..{len(lines)}")
          username, password = lines[idx - 1].split(',', 1)
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f"ACCOUNT_USERNAME={username}\n")
              f.write(f"ACCOUNT_PASSWORD={password}\n")
          PY

      - name: Sign in
        continue-on-error: true
        env:
          NOTIFY_ON: never
          RESULT_JSON_PATH: result.json
        run: |
          python h3/script.py "$ACCOUNT_USERNAME" "$ACCOUNT_PASSWORD" "true"

      - name: Ensure result file
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import os, json
          from datetime import datetime
          path = 'result.json'
          if os.path.exists(path):
              raise SystemExit(0)
          idx = int(os.getenv('ACCOUNT_INDEX', '0') or 0)
          payload = {
              'generated_at': datetime.now().isoformat(),
              'batch_name': os.getenv('BATCH_NAME', '') or '',
              'total_accounts': 1,
              'results': [{
                  'account_index': idx,
                  'sign_success': False,
                  'sign_status': '未生成结果文件',
                  'points_reward': 0,
                  'has_reward': False,
                  'password_error': False,
                  'retry_count': 0,
                  'is_final_retry': False,
              }],
          }
          with open(path, 'w', encoding='utf-8') as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
          PY

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.account_index }}
          path: result.json
          if-no-files-found: ignore
          retention-days: 1

  rerun_prepare:
    needs: [prepare, run]
    if: always()
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      count: ${{ steps.build.outputs.count }}
    steps:
      - name: Download first-pass results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: results-first

      - id: build
        shell: bash
        env:
          EXPECTED_TOTAL: ${{ needs.prepare.outputs.count }}
        run: |
          python - <<'PY'
          import os, json, glob
          expected = int(os.getenv('EXPECTED_TOTAL', '0') or 0)
          failed = []
          for p in glob.glob('results-first/**/result.json', recursive=True):
              try:
                  data = json.load(open(p, 'r', encoding='utf-8'))
              except Exception:
                  continue
              rows = data.get('results') if isinstance(data, dict) else None
              if not rows:
                  continue
              for r in rows:
                  idx = int(r.get('account_index') or 0)
                  if idx <= 0:
                      continue
                  sign_success = bool(r.get('sign_success'))
                  status = str(r.get('sign_status') or '')
                  password_error = bool(r.get('password_error'))
                  if (not sign_success and not password_error) or ('执行异常' in status) or ('滑块未通过' in status) or ('未生成结果文件' in status) or ('奖励异常(+0)' in status):
                      failed.append(idx)
          failed = sorted(set(failed))
          matrix = {'account_index': failed}
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"matrix={json.dumps(matrix, ensure_ascii=False)}\n")
              f.write(f"count={len(failed)}\n")
          print('failed indexes:', failed)
          PY

  rerun:
    needs: [prepare, rerun_prepare]
    if: ${{ always() && needs.rerun_prepare.outputs.count != '0' }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJSON(needs.rerun_prepare.outputs.matrix) }}
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      PASSPORT_URL: ${{ secrets.PASSPORT_URL }}
      REFERER: ${{ secrets.REFERER }}
      SLIDER_ID: ${{ secrets.SLIDER_ID }}
      WRAPPER_ID: ${{ secrets.WRAPPER_ID }}
      HEADER_CLIENT_TYPE: ${{ secrets.HEADER_CLIENT_TYPE }}
      HEADER_ACCESS_TOKEN: ${{ secrets.HEADER_ACCESS_TOKEN }}
      HEADER_ACCESS_TOKEN_FALLBACKS: ${{ secrets.HEADER_ACCESS_TOKEN_FALLBACKS }}
      HEADER_SECRET_KEY: ${{ secrets.HEADER_SECRET_KEY }}
      TOKEN_KEY: ${{ secrets.TOKEN_KEY }}
      TOKEN_ALTERNATIVE_KEYS: ${{ secrets.TOKEN_ALTERNATIVE_KEYS }}
      API_SIGN_PATH: ${{ secrets.API_SIGN_PATH }}
      ACCOUNT_INDEX: ${{ matrix.account_index }}
      ACCOUNTS: ${{ secrets.ACCOUNTS_BATCH2 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r h3/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Select account
        shell: bash
        run: |
          python - <<'PY'
          import os
          lines = [l.strip() for l in os.environ['ACCOUNTS'].splitlines() if l.strip()]
          idx = int(os.environ['ACCOUNT_INDEX'])
          if idx < 1 or idx > len(lines):
              raise SystemExit(f"Index {idx} out of range 1..{len(lines)}")
          username, password = lines[idx - 1].split(',', 1)
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f"ACCOUNT_USERNAME={username}\n")
              f.write(f"ACCOUNT_PASSWORD={password}\n")
          PY

      - name: Retry failed account on fresh runner
        continue-on-error: true
        env:
          NOTIFY_ON: never
          RESULT_JSON_PATH: result.json
        run: |
          python h3/script.py "$ACCOUNT_USERNAME" "$ACCOUNT_PASSWORD" "true"

      - name: Ensure result file
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import os, json
          from datetime import datetime
          path = 'result.json'
          if os.path.exists(path):
              raise SystemExit(0)
          idx = int(os.getenv('ACCOUNT_INDEX', '0') or 0)
          payload = {
              'generated_at': datetime.now().isoformat(),
              'batch_name': os.getenv('BATCH_NAME', '') or '',
              'total_accounts': 1,
              'results': [{
                  'account_index': idx,
                  'sign_success': False,
                  'sign_status': '未生成结果文件',
                  'points_reward': 0,
                  'has_reward': False,
                  'password_error': False,
                  'retry_count': 99,
                  'is_final_retry': True,
              }],
          }
          with open(path, 'w', encoding='utf-8') as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
          PY

      - name: Upload rerun result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rerun-result-${{ matrix.account_index }}
          path: result.json
          if-no-files-found: ignore
          retention-days: 1

  summary:
    needs: [prepare, run, rerun_prepare, rerun]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install notify deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: '*result-*'
          path: results

      - name: Summarize and notify
        env:
          GROUP_NAME: 账户组2
          EXPECTED_TOTAL: ${{ needs.prepare.outputs.count }}
          TOTAL_ACCOUNTS: ${{ needs.prepare.outputs.count }}
          FAIL_ON_FAILURE: 'true'
          NOTIFY_CHANNELS: telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_SSL: ${{ secrets.SMTP_SSL }}
          SMTP_USE_SSL: ${{ secrets.SMTP_SSL }}
          ACCOUNTS: ${{ secrets.ACCOUNTS_BATCH2 }}
        run: |
          python h3/aggregate.py results

      - name: Delete artifacts with retry
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const run_id = context.runId;
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
            let page = 1;
            while (true) {
              const { data } = await github.rest.actions.listWorkflowRunArtifacts({
                owner, repo, run_id, per_page: 100, page
              });
              for (const artifact of data.artifacts) {
                let deleted = false;
                for (let attempt = 1; attempt <= 3; attempt++) {
                  try {
                    await github.rest.actions.deleteArtifact({
                      owner, repo, artifact_id: artifact.id
                    });
                    deleted = true;
                    break;
                  } catch (e) {
                    core.warning(`delete artifact ${artifact.id} failed (attempt ${attempt}/3): ${e.message}`);
                    if (attempt < 3) await sleep(attempt * 2000);
                  }
                }
                if (!deleted) {
                  core.warning(`skip deleting artifact ${artifact.id} after retries`);
                }
              }
              if (data.artifacts.length < 100) break;
              page += 1;
            }
